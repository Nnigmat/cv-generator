<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Builder</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/cv.css" />
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>
  <div class="toolbar">
    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="cv">📄 CV</button>
      <button class="tab-btn" data-tab="cover">✉️ Cover Letter</button>
    </div>
    <div class="toolbar-group">
      <button class="btn active" id="btn-lang-en">EN</button>
      <button class="btn" id="btn-lang-de">DE</button>
    </div>
    <div class="toolbar-group">
      <button class="btn active" id="btn-preview">👁 Preview</button>
      <button class="btn" id="btn-edit">✏️ Edit</button>
    </div>
    <div class="toolbar-group">
      <button class="btn dark" id="btn-save-cv">🖨 Save CV as PDF</button>
      <button class="btn dark" id="btn-save-cl">🖨 Save Letter as PDF</button>
    </div>
    <div class="toolbar-group">
      <button class="btn" id="btn-export">⬇ Export JSON</button>
      <label class="btn" style="cursor:pointer">
        ⬆ Import JSON <input type="file" id="import-json" accept=".json" style="display:none" />
      </label>
      <button class="btn" id="btn-edit-json">{ } Edit JSON</button>
    </div>
    <a href="index.html" class="btn">← Dashboard</a>
  </div>

  <div class="builder-wrap">
    <div class="editor-panel" id="editor-panel" style="display:none"></div>
    <div class="preview-panel">
      <div class="preview-card" id="cv-preview"></div>
      <div class="preview-card" id="cl-preview" style="display:none"></div>
    </div>
  </div>

  <!-- JSON editor modal -->
  <div id="json-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:8px;padding:24px;width:min(700px,90vw);display:flex;flex-direction:column;gap:12px;max-height:90vh">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Edit JSON</strong>
        <button id="json-modal-close" class="btn">✕</button>
      </div>
      <textarea id="json-textarea" spellcheck="false" style="font-family:monospace;font-size:13px;flex:1;min-height:400px;resize:vertical;border:1px solid #ccc;border-radius:4px;padding:8px;outline:none"></textarea>
      <div id="json-error" style="color:red;font-size:12px;display:none"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="json-modal-cancel" class="btn">Cancel</button>
        <button id="json-modal-apply" class="btn dark">Apply</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/render-cv.js"></script>
  <script src="js/render-cl.js"></script>
  <script src="js/editor-cv.js"></script>
  <script src="js/editor-cl.js"></script>
  <script src="js/print.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
